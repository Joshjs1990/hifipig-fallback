name: Static Fallback Sync

on:
  workflow_dispatch:
    inputs:
      export_base_url:
        description: Public base URL of the generated static export
        required: true
        type: string
      target_branch:
        description: Branch to commit the static export into
        required: true
        default: main
        type: string
      commit_message:
        description: Commit message for the sync commit
        required: true
        default: Static fallback snapshot
        type: string
      fallback_domain:
        description: Optional fallback domain from the plugin settings
        required: false
        default: ""
        type: string
      triggered_at:
        description: Trigger timestamp
        required: false
        default: ""
        type: string
      changed_count:
        description: Changed file count reported by the plugin
        required: false
        default: "0"
        type: string
      build_mode:
        description: Build mode reported by the plugin
        required: false
        default: incremental
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Download export manifest
        env:
          EXPORT_BASE_URL: ${{ inputs.export_base_url }}
        run: |
          set -euo pipefail
          base_url="${EXPORT_BASE_URL%/}"
          curl --fail --silent --show-error \
            "$base_url/.hifipig-export-manifest.json" \
            -o /tmp/hifipig-export-manifest.json

      - name: Sync files from export
        env:
          EXPORT_BASE_URL: ${{ inputs.export_base_url }}
        run: |
          set -euo pipefail
          base_url="${EXPORT_BASE_URL%/}"
          new_manifest=/tmp/hifipig-export-manifest.json
          repo_manifest=.hifipig-export-manifest.json

          if [ -f "$repo_manifest" ]; then
            jq -r '.files[]' "$repo_manifest" | while IFS= read -r old_file; do
              [ -z "$old_file" ] && continue
              if ! jq -e --arg file "$old_file" '.files[] | select(. == $file)' "$new_manifest" >/dev/null; then
                rm -f "$old_file"
              fi
            done
          fi

          jq -r '.files[]' "$new_manifest" | while IFS= read -r rel_path; do
            [ -z "$rel_path" ] && continue
            mkdir -p "$(dirname "$rel_path")"
            curl --fail --silent --show-error \
              "$base_url/$rel_path" \
              -o "$rel_path"
          done

      - name: Commit and push changes
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git push origin "$TARGET_BRANCH"
